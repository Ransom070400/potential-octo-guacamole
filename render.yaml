# Render Blueprint (must live at repo root). Deploys the Enoki sponsor backend.
# Render → New + → Blueprint → connect this repo. Then set ENOKI_PRIVATE_KEY in the
# dashboard (sync:false = never stored in git).
services:
  - type: web
    name: pingou-sponsor
    runtime: node
    plan: free
    rootDir: Pingou/server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ENOKI_PRIVATE_KEY
        sync: false # paste your enoki_private_... in the Render dashboard
      - key: SPONSOR_SECRET
        sync: false # set the same value as the app's EXPO_PUBLIC_SPONSOR_SECRET
      - key: PINGOU_PACKAGE_ID
        value: '0xd2b46e84434c141bc5d31e80e7c76376bf9c54e3c416bd84c39997d8c9b3c0ae'
      - key: SUI_NETWORK
        value: testnet
